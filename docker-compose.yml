version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "nc", "-vz", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - ./init-kafka.sh:/init-kafka.sh
    command: >
      bash -c "/etc/confluent/docker/run &
               sleep 10 &&
               bash /init-kafka.sh &&
               wait"

  #
  # Apps
  #
  ticket-sales-processor:
    build: ./ticket-sales-processor
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AWS_ENDPOINT: http://localstack:4566
      AWS_REGION: us-east-1
      # Apenas o endpoint base é necessário
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      # Usando http/protobuf para garantir compatibilidade
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: ticket-sales-processor
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
    depends_on:
      - kafka
      - otel-collector
      - localstack
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  payment-processor-fake:
    build: ./payment-processor-fake
    environment:
      KAFKA_BROKER: kafka:9092
      REQUEST_TOPIC: payment-request
      RESPONSE_TOPIC: payment-response
      # Endpoint HTTP para o Collector
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: payment-processor-fake
      OTEL_LOGS_EXPORTER: otlp
    depends_on:
      - kafka
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "0.50"
          memory: 64M
        reservations:
          cpus: "0.10"
          memory: 32M

  load-tester:
    build: ./load-tester
    ports:
      - "8081:8081"
    environment:
      AWS_ENDPOINT: http://localstack:4566
      AWS_REGION: us-east-1
      QUEUE_NAME: ticket-sales-queue
      PORT: "8081"
    depends_on:
      localstack:
        condition: service_healthy

  localstack:
    container_name: localstack_bucket4j
    image: localstack/localstack
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - SERVICES=sqs,dynamodb
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  #
  # Observability
  #
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./observability/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus metrics exporter

  prometheus:
    image: prom/prometheus:v2.49.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:2.9.3
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.6.1
    user: root
    volumes:
      - /var/log:/var/log
      - ./observability/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml

  tempo:
    image: grafana/tempo:2.3.1
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./observability/tempo-config.yml:/etc/tempo.yaml
    ports:
      - "3200:3200" # Tempo HTTP
      - "4317"      # OTLP gRPC (internal)

  grafana:
    image: grafana/grafana:10.2.3
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
      - tempo
