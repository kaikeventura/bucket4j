server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=bucket4j"] # Filtra pelo projeto correto

    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service_name # Padroniza para service_name
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream

    pipeline_stages:
      # Extrai campos do JSON (Java usa logback JSON, Go usa log padrão, mas se for JSON ajuda)
      - json:
          expressions:
            level: level
            trace_id: trace_id
            span_id: span_id

      # Promove como labels para filtro no Loki
      - labels:
          level:
          trace_id:
          span_id:
